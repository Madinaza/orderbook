server:
  port: 8082

spring:
  application:
    name: trading-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5437/tradingdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      client-id: trading-service-producer

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_THIS_TO_A_LONG_SECURE_SECRET_12345678901234567890}
  kafka:
    enabled: ${APP_KAFKA_ENABLED:true}
  seed:
    enabled: true

logging:
  level:
    root: INFO
    com.aghaz.orderbook: INFO
    org.springframework.kafka: INFO