spring:
  datasource:
    url: jdbc:h2:mem:tradingdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  flyway:
    enabled: false

  kafka:
    listener:
      auto-startup: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

app:
  security:
    jwt:
      secret: "TEST_SECRET_CHANGE_ME_123456789012345678901234567890"
  kafka:
    enabled: false